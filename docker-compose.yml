services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: oocaa_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-oocaa_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oocaa_network

  # Django Application
  web:
    build: .
    container_name: oocaa_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./OOCAA:/app
      - static_volume:/app/staticfiles
    ports:
      - "8000:8000"
    environment:
      - DEBUG=${DEBUG:-True}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-local-dev-only}
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=${DB_NAME:-oocaa_db}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_PASSWORD=${DB_PASSWORD}
      - EMAIL_IMAP_SERVER=${EMAIL_IMAP_SERVER}
      - EMAIL_USERNAME=${EMAIL_USERNAME}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - oocaa_network

  # Email Listener Service (listens for CDM attachments)
  email-listener:
    build: .
    container_name: oocaa_email_listener
    command: python manage.py email_cdm_ingest
    volumes:
      - ./OOCAA:/app
    environment:
      - DEBUG=${DEBUG:-True}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-local-dev-only}
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=${DB_NAME:-oocaa_db}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_HOST=db
      - DB_PORT=5432
      - EMAIL_IMAP_SERVER=${EMAIL_IMAP_SERVER}
      - EMAIL_USERNAME=${EMAIL_USERNAME}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - oocaa_network
    restart: unless-stopped

volumes:
  postgres_data:
  static_volume:

networks:
  oocaa_network:
    driver: bridge
